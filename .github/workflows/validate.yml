name: AISA — CI

on:
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verifica struttura agenti
        run: |
          echo "Verifico presenza dei 3 agenti AISA..."
          for agent in requirement-analyst architect implementation-planner; do
            FILE="agents/${agent}/${agent}.md"
            if [ ! -f "$FILE" ]; then
              echo "ERRORE: agente mancante — $FILE"
              exit 1
            fi
            echo "  ✓ $FILE"
          done
          echo "Struttura agenti: OK"

      - name: Verifica entry point
        run: |
          echo "Verifico tools/run.py..."
          if [ ! -f "tools/run.py" ]; then
            echo "ERRORE: tools/run.py non trovato"
            exit 1
          fi
          python -m py_compile tools/run.py
          echo "  ✓ tools/run.py — sintassi Python valida"

      - name: Sintassi Python (tutti i tool)
        run: |
          echo "Verifico sintassi Python in tools/..."
          for f in tools/*.py; do
            python -m py_compile "$f" && echo "  ✓ $f" || exit 1
          done
