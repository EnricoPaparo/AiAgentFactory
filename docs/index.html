<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI School — Agent Factory</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">AI School</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Chiudi menu">✕</button>
    </div>

    <nav class="sidebar-nav" id="lessonNav">
      <div class="nav-label">MODULI</div>
      <!-- popolato da JS -->
    </nav>

    <div class="sidebar-footer">
      <a href="https://github.com/enricopaparo/aiagentfactory" target="_blank" class="gh-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub
      </a>
    </div>
  </aside>

  <!-- OVERLAY mobile -->
  <div class="overlay" id="overlay"></div>

  <!-- MAIN -->
  <main class="main" id="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="Apri menu">
        <span></span><span></span><span></span>
      </button>
      <div class="breadcrumb" id="breadcrumb">Home</div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </header>

    <!-- HOME -->
    <section class="home-view" id="homeView">
      <div class="hero">
        <div class="hero-badge">⚡ Agent Factory</div>
        <h1>AI School</h1>
        <p class="hero-sub">Impara a costruire agenti AI da zero. Dalle basi dei modelli linguistici fino ai sistemi multi-agente pronti per la produzione.</p>
        <button class="btn-start" id="btnStart">Inizia il corso →</button>
      </div>

      <div class="modules-grid" id="modulesGrid">
        <!-- card moduli generate da JS -->
      </div>
    </section>

    <!-- LEZIONE -->
    <section class="lesson-view" id="lessonView" style="display:none">
      <article class="lesson-content" id="lessonContent">
        <div class="loading">Caricamento lezione...</div>
      </article>
      <nav class="lesson-nav-btns">
        <button class="btn-nav" id="btnPrev">← Precedente</button>
        <button class="btn-nav btn-next" id="btnNext">Successiva →</button>
      </nav>
    </section>

  </main>

  <!-- marked.js per il rendering Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- highlight.js per il syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
